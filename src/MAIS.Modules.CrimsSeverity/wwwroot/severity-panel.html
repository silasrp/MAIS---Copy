<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CRIMS Severity</title>
  <script src="/libs/chart.min.js"></script>
  <script src="/libs/signalr.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-normal:       #16213E;
      --bg-spike:        #1A0808;
      --border-normal:   rgba(108,142,255,0.18);
      --border-spike:    rgba(248,113,113,0.55);
      --glow-normal:     rgba(108,142,255,0.0);
      --glow-spike:      rgba(248,113,113,0.35);
      --text-primary:    #E8EAF0;
      --text-secondary:  #8B95B0;
      --text-muted:      #4A5568;
      --accent:          #6C8EFF;
      --c-critical:      #F87171;
      --c-high:          #FB923C;
      --c-warning:       #FCD34D;
      --c-info:          #34D399;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg-normal);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text-primary);
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      transition: background 0.8s ease, box-shadow 0.8s ease;
    }

    body.spike {
      background: var(--bg-spike);
      animation: spikeGlow 1.8s ease-in-out infinite alternate;
    }

    @keyframes spikeGlow {
      from { box-shadow: inset 0 0 18px rgba(248,113,113,0.18),
                         inset 0 0 40px rgba(248,113,113,0.08); }
      to   { box-shadow: inset 0 0 30px rgba(248,113,113,0.42),
                         inset 0 0 70px rgba(248,113,113,0.18); }
    }

    #shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 9px 10px 7px;
      gap: 5px;
      border: 1px solid var(--border-normal);
      border-radius: 0;
      transition: border-color 0.8s ease;
    }

    body.spike #shell { border-color: var(--border-spike); }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #title {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    #status-badge {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 10px;
      flex-shrink: 0;
      margin-left: 6px;
      letter-spacing: 0.03em;
      transition: all 0.4s ease;
    }

    #status-badge.normal  { background: rgba(52,211,153,0.15); color: #34D399; }
    #status-badge.spike   { background: rgba(248,113,113,0.2); color: #F87171;
                            animation: badgePulse 1.4s ease-in-out infinite; }
    #status-badge.offline { background: rgba(107,114,128,0.2); color: #6B7280; }

    @keyframes badgePulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.5; }
    }

    /* ── Chart area ── */
    #chart-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
    }

    #chart-wrap canvas { display: block; }

    /* ── Footer: counts row ── */
    #counts {
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
      padding-top: 3px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .count-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      flex: 1;
    }

    .count-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
    }

    .count-value {
      font-size: 10px;
      font-weight: 600;
      line-height: 1;
    }

    .count-label {
      font-size: 8px;
      color: var(--text-muted);
      line-height: 1;
    }

    /* ── Cooldown strip ── */
    #cooldown-bar-wrap {
      height: 2px;
      background: rgba(248,113,113,0.15);
      border-radius: 1px;
      overflow: hidden;
      flex-shrink: 0;
      display: none;
    }

    body.spike #cooldown-bar-wrap { display: block; }

    #cooldown-bar {
      height: 100%;
      background: linear-gradient(90deg, #F87171, #FB923C);
      border-radius: 1px;
      transition: width 1s linear;
    }

    /* ── Offline overlay ── */
    #offline-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(11,17,38,0.85);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }

    #offline-overlay.visible { display: flex; }

    .offline-icon { font-size: 20px; }

    /* ── Last update timestamp ── */
    #last-update {
      font-size: 8px;
      color: var(--text-muted);
      text-align: right;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="shell">

    <div id="header">
      <span id="title">CRIMS Logs Severity Distribution</span>
      <span id="status-badge" class="normal">LIVE</span>
    </div>

    <div id="cooldown-bar-wrap">
      <div id="cooldown-bar" style="width:100%"></div>
    </div>

    <div id="chart-wrap">
      <canvas id="chart"></canvas>
      <div id="offline-overlay">
        <span class="offline-icon">⚠</span>
        <span>Log aggregator unreachable</span>
      </div>
    </div>

    <div id="counts">
      <div class="count-item">
        <div class="count-dot" style="background:var(--c-critical)"></div>
        <span class="count-value" id="cnt-critical" style="color:var(--c-critical)">—</span>
        <span class="count-label">CRIT</span>
      </div>
      <div class="count-item">
        <div class="count-dot" style="background:var(--c-high)"></div>
        <span class="count-value" id="cnt-high" style="color:var(--c-high)">—</span>
        <span class="count-label">HIGH</span>
      </div>
      <div class="count-item">
        <div class="count-dot" style="background:var(--c-warning)"></div>
        <span class="count-value" id="cnt-warning" style="color:var(--c-warning)">—</span>
        <span class="count-label">WARN</span>
      </div>
      <div class="count-item">
        <div class="count-dot" style="background:var(--c-info)"></div>
        <span class="count-value" id="cnt-info" style="color:var(--c-info)">—</span>
        <span class="count-label">INFO</span>
      </div>
    </div>

    <div id="last-update">Connecting…</div>

  </div>

  <script>
  (() => {
    'use strict';

    // ── Config injected by the host page (overridable) ──────────────────
    const SOURCE_URL = window.__MAIS_SOURCE_URL__ || 'http://boswidad01:8080';
    const HUB_URL    = window.__MAIS_HUB_URL__    || 'https://localhost:5002/hubs/severity';

    // ── Colour map ───────────────────────────────────────────────────────
    const SEVERITY_CONFIG = {
      CRITICAL: { color: '#F87171', border: '#EF4444', label: 'Critical', countEl: 'cnt-critical' },
      HIGH:     { color: '#FB923C', border: '#F97316', label: 'High',     countEl: 'cnt-high'     },
      WARNING:  { color: '#FCD34D', border: '#F59E0B', label: 'Warning',  countEl: 'cnt-warning'  },
      INFO:     { color: '#34D399', border: '#10B981', label: 'Info',     countEl: 'cnt-info'     },
    };

    const ORDER = ['CRITICAL', 'HIGH', 'WARNING', 'INFO'];

    // ── Chart setup ──────────────────────────────────────────────────────
    const ctx = document.getElementById('chart').getContext('2d');

    const chartData = {
      labels: ORDER.map(k => SEVERITY_CONFIG[k].label),
      datasets: [{
        data: [0, 0, 0, 0],
        backgroundColor: ORDER.map(k => SEVERITY_CONFIG[k].color + 'CC'),
        borderColor:     ORDER.map(k => SEVERITY_CONFIG[k].border),
        borderWidth: 1.5,
        borderRadius: 3,
        borderSkipped: false,
      }]
    };

    const chart = new Chart(ctx, {
      type: 'bar',
      data: chartData,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 400, easing: 'easeOutQuart' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0F172A',
            titleColor: '#E8EAF0',
            bodyColor: '#8B95B0',
            borderColor: '#2A3A5C',
            borderWidth: 1,
            padding: 8,
            callbacks: {
              label: ctx => ` ${ctx.parsed.y.toLocaleString()} entries`
            }
          }
        },
        scales: {
          x: {
            grid: { display: false },
            border: { display: false },
            ticks: {
              color: '#4A5568',
              font: { size: 9, family: 'Segoe UI' },
              padding: 2,
            }
          },
          y: {
            grid: {
              color: 'rgba(255,255,255,0.04)',
              drawBorder: false,
            },
            border: { display: false },
            ticks: {
              color: '#4A5568',
              font: { size: 8, family: 'Segoe UI' },
              padding: 4,
              maxTicksLimit: 4,
              callback: v => v >= 1000 ? (v/1000).toFixed(0)+'k' : v,
            }
          }
        }
      }
    });

    // ── State ────────────────────────────────────────────────────────────
    let spikeActive = false;
    let cooldownTotal = 0;
    let cooldownRemaining = 0;
    let cooldownInterval = null;

    // ── DOM refs ─────────────────────────────────────────────────────────
    const body            = document.body;
    const statusBadge     = document.getElementById('status-badge');
    const offlineOverlay  = document.getElementById('offline-overlay');
    const lastUpdateEl    = document.getElementById('last-update');
    const cooldownBar     = document.getElementById('cooldown-bar');

    // ── Click → open source application ─────────────────────────────────
    document.getElementById('shell').addEventListener('click', () => {
      window.open(SOURCE_URL, '_blank');
    });

    // ── Apply data update ────────────────────────────────────────────────
    function applyUpdate(update) {
      offlineOverlay.classList.remove('visible');

      // Map data to chart order
      const countMap = {};
      (update.data || []).forEach(e => { countMap[e.key.toUpperCase()] = e.count; });

      chart.data.datasets[0].data = ORDER.map(k => countMap[k] ?? 0);
      chart.update('active');

      // Update count pills
      ORDER.forEach(k => {
        const el = document.getElementById(SEVERITY_CONFIG[k].countEl);
        const v = countMap[k] ?? 0;
        el.textContent = v >= 1000 ? (v/1000).toFixed(1)+'k' : v;
      });

      // Spike state
      if (update.isSpikeActive !== spikeActive) {
        spikeActive = update.isSpikeActive;
        body.classList.toggle('spike', spikeActive);
        statusBadge.className = 'spike ' + (spikeActive ? 'spike' : 'normal');
        statusBadge.textContent = spikeActive ? '⚠ SPIKE' : 'LIVE';
      }

      // Cooldown progress bar
      if (spikeActive && update.cooldownRemainingSeconds > 0) {
        cooldownTotal     = cooldownTotal || update.cooldownRemainingSeconds;
        cooldownRemaining = update.cooldownRemainingSeconds;

        const pct = (cooldownRemaining / cooldownTotal) * 100;
        cooldownBar.style.width = pct + '%';

        // Local 1-second countdown so the bar moves smoothly between polls
        clearInterval(cooldownInterval);
        cooldownInterval = setInterval(() => {
          if (cooldownRemaining <= 0) { clearInterval(cooldownInterval); return; }
          cooldownRemaining--;
          const p = (cooldownRemaining / cooldownTotal) * 100;
          cooldownBar.style.width = p + '%';
        }, 1000);
      } else if (!spikeActive) {
        clearInterval(cooldownInterval);
        cooldownTotal = 0;
        cooldownBar.style.width = '100%';
        statusBadge.className = 'normal';
        statusBadge.textContent = 'LIVE';
      }

      // Timestamp
      const ts = new Date(update.timestamp);
      lastUpdateEl.textContent = ts.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    }

    function showOffline(reason) {
      offlineOverlay.classList.add('visible');
      statusBadge.className = 'offline';
      statusBadge.textContent = 'OFFLINE';
      lastUpdateEl.textContent = 'Endpoint unreachable';
      body.classList.remove('spike');
    }

    // ── SignalR connection ────────────────────────────────────────────────
    const connection = new signalR.HubConnectionBuilder()
      .withUrl(HUB_URL)
      .withAutomaticReconnect({
        nextRetryDelayInMilliseconds: retryContext => {
          // Retry: 0s, 2s, 5s, 10s, 15s... cap at 30s
          const delays = [0, 2000, 5000, 10000, 15000, 30000];
          return delays[Math.min(retryContext.previousRetryCount, delays.length - 1)];
        }
      })
      .configureLogging(signalR.LogLevel.Warning)
      .build();

    connection.on('SeverityDataUpdated', applyUpdate);
    connection.on('SeverityEndpointUnavailable', showOffline);

    connection.onreconnecting(() => {
      statusBadge.className = 'offline';
      statusBadge.textContent = 'RECONNECTING';
    });

    connection.onreconnected(() => {
      statusBadge.className = 'normal';
      statusBadge.textContent = 'LIVE';
    });

    connection.onclose(() => {
      statusBadge.className = 'offline';
      statusBadge.textContent = 'DISCONNECTED';
    });

    async function startConnection() {
      try {
        await connection.start();
        statusBadge.className = 'normal';
        statusBadge.textContent = 'LIVE';
      } catch (err) {
        statusBadge.className = 'offline';
        statusBadge.textContent = 'OFFLINE';
        setTimeout(startConnection, 5000);
      }
    }

    startConnection();
  })();
  </script>
</body>
</html>
